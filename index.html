<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Shader Lab</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Outfit:wght@200;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #08080c;
  --surface: #111118;
  --border: #2a2a3a;
  --text: #c8c8d8;
  --dim: #666680;
  --accent: #ff2d95;
  --accent2: #7b2fff;
  --accent3: #00e5ff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; min-height: 100vh; }
canvas { display: block; width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; z-index: 0; }

/* GALLERY */
#gallery-screen { position: relative; z-index: 1; min-height: 100vh; }
#gallery-screen header { padding: 60px 40px 20px; text-align: center; }
#gallery-screen header h1 {
  font-family: 'JetBrains Mono', monospace; font-weight: 300;
  font-size: 13px; letter-spacing: 8px; text-transform: uppercase; color: var(--dim); margin-bottom: 12px;
}
#gallery-screen header h2 {
  font-weight: 200; font-size: 48px; letter-spacing: -1px;
  background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.shader-list { max-width: 600px; margin: 40px auto; padding: 0 40px; display: flex; flex-direction: column; gap: 12px; }
.shader-link {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 24px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; cursor: pointer; transition: all 0.25s; text-decoration: none;
}
.shader-link:hover { border-color: var(--accent); box-shadow: 0 0 24px rgba(255,45,149,0.12); transform: translateY(-2px); }
.shader-link h3 { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 15px; color: #fff; margin-bottom: 4px; }
.shader-link p { font-size: 13px; color: var(--dim); }
.shader-link .arrow { color: var(--dim); font-size: 20px; transition: color 0.2s; }
.shader-link:hover .arrow { color: var(--accent); }

/* SHADER VIEW */
#shader-screen { display: none; }
#shader-screen.active { display: block; }
#gallery-screen.hidden { display: none; }

#controls {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
  background: linear-gradient(transparent, rgba(8,8,12,0.85) 30%, rgba(8,8,12,0.95));
  padding: 40px 30px 24px; transition: opacity 0.4s; opacity: 1;
}
#controls.faded { opacity: 0; pointer-events: none; }
#back-btn {
  position: fixed; top: 20px; left: 20px; z-index: 10;
  font-family: 'JetBrains Mono', monospace; font-size: 13px;
  color: var(--dim); background: none; border: none; cursor: pointer; transition: all 0.3s;
}
#back-btn:hover { color: #fff; }
#shader-title {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10;
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  letter-spacing: 3px; text-transform: uppercase; color: var(--dim); transition: opacity 0.4s;
}
.ctrl-row { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
.ctrl-row label { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--dim); letter-spacing: 1px; }
.ctrl-row input[type="number"], .ctrl-row select {
  background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 5px;
  color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 12px;
  padding: 6px 10px; width: 80px; outline: none;
}
.ctrl-row input:focus, .ctrl-row select:focus { border-color: var(--accent); }
.ctrl-row select { cursor: pointer; -webkit-appearance: none; }
.speed-group { display: flex; align-items: center; gap: 8px; }
.speed-btn {
  background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--text);
  font-family: 'JetBrains Mono', monospace; font-size: 14px;
  width: 30px; height: 30px; border-radius: 5px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.speed-btn:hover { border-color: var(--accent); color: var(--accent); }
#speed-val { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; color: #fff; min-width: 60px; text-align: center; }
input[type="range"] { -webkit-appearance: none; width: 140px; height: 3px; background: var(--border); border-radius: 2px; outline: none; }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; }
.render-btns { display: flex; gap: 10px; justify-content: center; margin-top: 14px; }
.render-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600;
  letter-spacing: 1px; padding: 10px 20px; border-radius: 6px;
  border: 1px solid; cursor: pointer; transition: all 0.2s; text-transform: uppercase; background: transparent;
}
.render-btn.q720 { border-color: var(--accent3); color: var(--accent3); }
.render-btn.q720:hover { background: rgba(0,229,255,0.1); }
.render-btn.q1080 { border-color: var(--accent); color: var(--accent); }
.render-btn.q1080:hover { background: rgba(255,45,149,0.1); }
.render-btn.q4k { border-color: var(--accent2); color: var(--accent2); }
.render-btn.q4k:hover { background: rgba(123,47,255,0.1); }
#toast {
  position: fixed; bottom: 200px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--surface); border: 1px solid var(--accent); color: var(--text);
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  padding: 10px 20px; border-radius: 6px; opacity: 0; transition: all 0.3s;
  pointer-events: none; z-index: 20; max-width: 90vw; text-align: center;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
body.hide-cursor, body.hide-cursor * { cursor: none !important; }
.section-label {
  font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 4px;
  text-transform: uppercase; color: var(--dim); text-align: center; padding: 10px 0 4px;
}
.section-label.user-label { color: var(--accent3); }
</style>
</head>
<body>

<div id="gallery-screen">
  <header>
    <h1>Volibeats</h1>
    <h2>Shader Lab</h2>
  </header>
  <div class="shader-list" id="user-shader-list"></div>
  <div class="shader-list" id="shader-list"></div>
</div>

<div id="shader-screen">
  <canvas id="c"></canvas>
  <button id="back-btn">← back</button>
  <div id="shader-title"></div>
  <div id="controls">
    <div class="ctrl-row">
      <label>speed</label>
      <div class="speed-group">
        <button class="speed-btn" id="s-down">←</button>
        <input type="range" id="s-range" min="-3" max="3" step="0.1" value="0">
        <button class="speed-btn" id="s-up">→</button>
        <span id="speed-val">1.0×</span>
      </div>
      <label style="margin-left:20px">duration (s)</label>
      <input type="number" id="r-dur" value="30" min="1" step="1">
      <label style="margin-left:12px">fps</label>
      <input type="number" id="r-fps" value="30" min="1" max="60">
      <label style="margin-left:12px">fmt</label>
      <select id="r-fmt"><option value="jpeg">jpeg (fast)</option><option value="png">png (slow)</option></select>
    </div>
    <div class="render-btns">
      <button class="render-btn q720" onclick="copyCmd(1280,720)">720p</button>
      <button class="render-btn q1080" onclick="copyCmd(1920,1080)">1080p</button>
      <button class="render-btn q4k" onclick="copyCmd(3840,2160)">4K</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ---- REGISTRY ----
// USER SHADERS — add new shaders here; they appear at the top of the gallery.
// Example:
//   { id: 'my_shader', name: 'My Shader', desc: 'A short description.' },
const userShaders = [
  { id: 'coral_reef', name: 'Coral Reef', desc: 'Sunlit underwater coral reef with caustics, god rays, and drifting plankton.' },
];

// BUILT-IN SHADERS — shipped with the repo.
const builtinShaders = [
  { id: 'synthwave_nebula', name: 'Synthwave Nebula', desc: 'Triangle-noise clouds over a retrowave grid with sun.' },
  { id: 'deep_space_nebula', name: 'Deep Space Nebula', desc: 'Domain-warped simplex noise. Drifting through cosmic gas.' },
  { id: 'gas_giant_flyby', name: 'Gas Giant Flyby', desc: 'Flying through colorful clouds above a gas giant.' },
];

const shaders = [...userShaders, ...builtinShaders];

// ---- SHADER SOURCES ----
const S = {};

S['synthwave_nebula'] = `#version 300 es
precision highp float;
out vec4 fragColor;
uniform vec2 u_res;
uniform float u_time;
#define T u_time
#define Tslow (u_time*0.2)
float tri(in float x){return abs(fract(x)-0.5);}
vec3 tri3(in vec3 p){return vec3(tri(p.z+tri(p.y)),tri(p.z+tri(p.x)),tri(p.y+tri(p.x)));}
float triNoise3d(vec3 p){
    p.z+=T/40.0;float z=1.5,rz=0.0;vec3 bp=p;
    float ca=cos(0.3),sa=sin(0.3);mat2 m2=mat2(ca,sa,-sa,ca);
    for(float i=0.0;i<=3.0;i++){vec3 dg=tri3(bp*2.0);p+=dg+T/30.0;bp*=2.0;z*=1.75;p*=1.1;p.yz*=m2;
    rz+=tri(p.z+tri(p.x+tri(p.y)))/z;bp+=0.2;}return rz;}
float sun(vec2 uv){float val=smoothstep(0.3,0.29,length(uv));float bloom=smoothstep(0.7,0.0,length(uv));
    float cut=3.0*sin((uv.y+Tslow*0.2*1.02)*100.0)+clamp(uv.y*14.0+1.0,-6.0,6.0);
    return clamp(val*clamp(cut,0.0,1.0),0.0,1.0)+bloom*0.6;}
float grid(vec2 uv){vec2 size=vec2(uv.y,uv.y*uv.y*0.2)*0.01;uv+=vec2(0.0,Tslow*4.0*1.05);
    uv=abs(fract(uv)-0.5);vec2 lines=smoothstep(size,vec2(0.0),uv);
    lines+=smoothstep(size*5.0,vec2(0.0),uv)*0.4;return clamp(lines.x+lines.y,0.0,3.0);}
void main(){vec2 u=gl_FragCoord.xy;vec3 res=vec3(u_res,1.0);vec2 uv=(2.0*u-res.xy)/res.y;vec4 o=vec4(0.0);
    if(uv.y>=-0.2){vec3 D=normalize(vec3((u+u-res.xy)/res.y,1.0));float d=0.0;
        for(float i=0.0;i<100.0;i++){vec3 p=D*d;p.y+=2.5;float s=6.0-abs(p.y-cos(p.x/30.0)*4.0);
            s-=8.4*triNoise3d(p/30.0);d+=s=0.1+0.4*abs(s);
            vec3 hp=vec3(1.0,0.2,0.8),or=vec3(1.0,0.4,0.1),pu=vec3(0.6,0.1,0.9);
            float ph=Tslow*0.15+i*0.1;vec3 cc=mix(hp,or,0.5+0.5*cos(ph));cc=mix(cc,pu,0.5+0.5*sin(ph*0.7));
            o+=vec4(6.0*cc/s,0.0);o+=vec4(0.5*vec3(1.0,0.2,0.6)/abs(1.01+uv.y-cos(uv.x/3.3)),0.0);
            float strobe=1.0+7.0*(0.5+0.5*sin(Tslow*2.0));
            o+=vec4(4.0*strobe*vec3(0.8,0.15,0.4)/length(uv*2.0),0.0);}
        o=tanh(o/5000.0*exp(100.0*vec4(5.0,2.0,1.5,0.0)/d/d));
        vec2 sUV=uv+vec2(0.75,0.2);sUV.y-=0.6;float sv=sun(sUV);
        vec3 sc=vec3(1.0,0.2,1.0);sc=mix(sc,vec3(1.0,0.4,0.1),sUV.y*2.0+0.2);sc=mix(vec3(0.0),sc,sv);
        float cd=clamp(length(o.rgb)*2.0,0.0,1.0);o.rgb=mix(sc,o.rgb,cd*0.7+0.3);o.rgb+=sc*0.3*(1.0-cd);
        float hf=smoothstep(0.3,-0.2,uv.y);vec3 hc=mix(vec3(0.6,0.0,0.4),vec3(1.0,0.3,0.1),hf);
        o.rgb=mix(o.rgb,hc,hf*0.4);float fog=smoothstep(0.1,-0.02,abs(uv.y+0.2));
        o.rgb+=fog*fog*fog*vec3(1.0,0.4,0.8);}
    if(uv.y<-0.2){vec2 gUV=uv;gUV.y=3.0/(abs(gUV.y+0.2)+0.05);gUV.x*=gUV.y;float gv=grid(gUV);
        vec3 gc=vec3(0.0,0.05,0.15);gc=mix(gc,vec3(1.0,0.3,1.0),gv);
        float di=1.0/(abs(uv.y+0.2)+0.05);gc*=smoothstep(100.0,10.0,di);
        float hg=smoothstep(-0.5,-0.2,uv.y);gc+=vec3(0.5,0.1,0.3)*hg*hg;o.rgb=gc;}
    vec3 col=o.rgb;float gray=dot(col,vec3(0.299,0.587,0.114));col=mix(vec3(gray),col,1.4);
    vec2 vuv=gl_FragCoord.xy/u_res;col*=1.0-0.5*dot((vuv-0.5)*1.3,(vuv-0.5)*1.3);
    col*=0.95+0.05*sin(gl_FragCoord.y*2.5);col=pow(max(col,0.0),vec3(0.9));fragColor=vec4(col,1.0);}`;

S['deep_space_nebula'] = `#version 300 es
precision highp float;
out vec4 fragColor;
uniform vec2 u_res;
uniform float u_time;
vec3 hash33(vec3 p){p=vec3(dot(p,vec3(127.1,311.7,74.7)),dot(p,vec3(269.5,183.3,246.1)),dot(p,vec3(113.5,271.9,124.6)));
    return -1.0+2.0*fract(sin(p)*43758.5453123);}
float simplex3d(vec3 p){const float K1=0.333333333,K2=0.166666667;
    vec3 i=floor(p+(p.x+p.y+p.z)*K1);vec3 d0=p-(i-(i.x+i.y+i.z)*K2);
    vec3 e=step(vec3(0.0),d0-d0.yzx);vec3 i1=e*(1.0-e.zxy);vec3 i2=1.0-e.zxy*(1.0-e);
    vec3 d1=d0-(i1-K2),d2=d0-(i2-2.0*K2),d3=d0-(1.0-3.0*K2);
    vec4 h=max(0.6-vec4(dot(d0,d0),dot(d1,d1),dot(d2,d2),dot(d3,d3)),0.0);
    vec4 n=h*h*h*h*vec4(dot(d0,hash33(i)),dot(d1,hash33(i+i1)),dot(d2,hash33(i+i2)),dot(d3,hash33(i+1.0)));
    return dot(n,vec4(52.0));}
float fbm2(vec3 p){return 0.5*simplex3d(p)+0.25*simplex3d(p*2.0);}
float warpedFbm(vec3 p){
    vec3 q=vec3(fbm2(p),fbm2(p+vec3(5.2,1.3,2.8)),fbm2(p+vec3(1.7,9.2,4.1)));
    return fbm2(p+3.5*q);}
float flameBursts(vec3 p,float ti){
    float s=0.0;
    for(int k=0;k<4;k++){
        float fk=float(k);
        float seg=floor(ti*0.11+fk*0.29);
        vec3 h=hash33(vec3(seg,fk*7.1,4.2));
        vec3 cen=vec3(mix(-7.0,7.0,h.x),mix(-5.0,5.0,h.y),seg*1.15+mix(-3.0,3.0,h.z));
        cen+=vec3(ti*0.08,ti*0.05,ti*0.06)*vec3(h.x-0.5,h.y-0.5,0.3);
        float cyc=fract(ti*0.17+fk*0.19+h.z);
        float life=smoothstep(0.0,0.07,cyc)*(1.0-smoothstep(0.32,0.52,cyc));
        float r=length(p-cen);
        float core=exp(-r*r*(0.09+0.06*h.x));
        float corona=exp(-r*r*0.035)*0.35;
        s+=(core+corona)*life;}
    return s;}
vec4 nebula(vec3 ro,vec3 rd){vec4 col=vec4(0);float t=0.0,dt=0.28;float ti=u_time;
    for(int i=0;i<36;i++){vec3 p=ro+rd*t;float ts=ti*0.012;p+=vec3(ts*0.7,ts*0.3,ts*0.5);
        float density=warpedFbm(p*0.11);
        float rib=abs(fbm2(p*0.19+vec3(ts*0.08)))*0.55+0.45;
        density=mix(density,density*rib+0.12*rib,0.42);
        density=smoothstep(-0.36,0.5,density);
        if(density>0.01){float cn=fbm2(p*0.07+vec3(ti*0.005))*0.5+0.5;
            vec3 purple=vec3(0.25,0.05,0.45),blue=vec3(0.03,0.1,0.4),teal=vec3(0.02,0.3,0.35),
                 gold=vec3(0.6,0.35,0.05),crimson=vec3(0.5,0.02,0.1);
            vec3 bc=cn<0.25?mix(purple,blue,cn*4.0):cn<0.5?mix(blue,teal,(cn-0.25)*4.0):
                   cn<0.75?mix(teal,gold,(cn-0.5)*4.0):mix(gold,crimson,(cn-0.75)*4.0);
            float em=smoothstep(0.35,0.85,density)*1.5;vec3 ec=bc*(1.0+em*2.0);
            float alpha=density*0.102;col.rgb+=ec*alpha*(1.0-col.a);col.a+=alpha*(1.0-col.a);
            float fl=flameBursts(p,ti);
            if(fl>0.004){float ft=fbm2(p*0.55+vec3(ti*0.25))*0.5+0.5;
                vec3 fc=mix(vec3(1.0,0.12,0.02),mix(vec3(1.0,0.45,0.06),vec3(1.0,0.85,0.35),ft),smoothstep(0.2,0.9,fl));
                float fa=fl*0.22;col.rgb+=fc*fa*(1.0-col.a);col.a+=fa*0.45*(1.0-col.a);}
            if(col.a>0.95)break;}t+=dt;dt*=1.025;}return col;}
float stars(vec2 uv,float t){vec2 id=floor(uv*140.0),f=fract(uv*140.0)-0.5;
    float h=fract(sin(dot(id,vec2(127.1,311.7)))*43758.5453);
    float b=smoothstep(0.8,1.0,h),tw=sin(t*(2.0+h*4.0)+h*6.28)*0.5+0.5;
    return smoothstep(0.035+h*0.045,0.0,length(f))*b*(0.6+0.4*tw);}
float shootingStars(vec2 uv,float ti){
    float m=0.0;
    for(int i=0;i<7;i++){
        float fi=float(i);
        float h0=fract(sin(fi*19.27+91.3)*43758.54);
        float h1=fract(sin(fi*47.11+12.9)*23421.12);
        vec2 dir=normalize(vec2(0.42+0.35*h0,-0.55-0.2*h1));
        float cyc=fract(ti*(0.11+h0*0.06)+fi*0.37);
        float vis=smoothstep(0.0,0.025,cyc)*smoothstep(0.42,0.28,cyc);
        vec2 base=vec2(mix(-1.55,1.55,fract(fi*0.413+ti*0.007)),mix(-0.75,0.85,fract(fi*0.791+h0)));
        vec2 pos=base+dir*cyc*4.2;
        vec2 d=uv-pos;
        float along=max(dot(d,dir),0.0);
        float across=abs(dot(d,vec2(-dir.y,dir.x)));
        float tail=smoothstep(0.62,0.0,along);
        float streak=exp(-across*across*(650.0+h1*400.0))*tail*tail*vis;
        m+=streak*(0.75+0.25*sin(ti*3.0+fi));}
    return m;}
float raySphereT(vec3 ro,vec3 rd,vec3 c,float R){
    vec3 oc=ro-c;float b=dot(oc,rd);float D=b*b-dot(oc,oc)+R*R;
    if(D<0.0)return -1.0;float s=sqrt(D),t1=-b-s,t2=-b+s;
    if(t1>0.001)return t1;if(t2>0.001)return t2;return -1.0;}
vec3 shadeFireSurface(vec3 hp,vec3 rd,vec3 cen,float ti,float heat){
    vec3 n=normalize(hp-cen);float mu=max(dot(-rd,n),0.0);
    vec3 gp=hp*(2.35+heat*0.4)+vec3(ti*0.32,ti*0.21,ti*0.08);
    float f=fbm2(gp),g=fbm2(gp*2.5+vec3(9.0,ti*0.55,ti*0.2)),sw=f*0.52+g*0.48;
    float rim=pow(1.0-mu,2.5);
    vec3 plasma=mix(vec3(1.0,0.92,0.55),vec3(1.0,0.38,0.03),smoothstep(0.12,0.9,sw));
    vec3 edge=mix(vec3(1.0,0.2,0.0),vec3(0.55,0.02,0.0),rim);
    vec3 co=mix(plasma,edge,rim*0.9);
    float pu=0.78+0.22*sin(ti*(1.65+heat*0.5)+sw*6.28318);
    return co*(1.25+sw*2.1)*pu*heat;}
vec3 solarCorona(vec3 ro,vec3 rd,vec3 sunCen,float ti){
    vec3 ts=normalize(sunCen-ro);float mu=max(dot(rd,ts),0.0);
    float warp=fbm2(vec3(rd.yx*5.5,ti*0.055))*0.065;mu=clamp(mu+warp,0.0,1.0);
    vec3 C=vec3(0.0);
    C+=vec3(1.0,0.99,1.0)*pow(mu,340.0)*16.0;
    C+=vec3(1.0,0.52,0.12)*pow(mu,105.0)*6.0;
    C+=vec3(1.0,0.3,0.04)*pow(mu,34.0)*2.8;
    C+=vec3(1.0,0.42,0.09)*pow(mu,10.0)*0.55;
    C+=vec3(1.0,0.18,0.02)*pow(mu,4.0)*0.12;
    float fil=fbm2(ts*3.8+vec3(0.0,0.0,ti*0.11));C*=0.76+0.5*fil;return C;}
vec3 infernoBodies(vec3 ro,vec3 rd,float ti,vec3 fw,vec3 ri,vec3 up){
    vec3 sunCen=ro+fw*56.0+ri*(8.5+3.8*sin(ti*0.13))+up*(3.2*cos(ti*0.1)+1.8*sin(ti*0.088));
    float sunR=5.5;float ang=ti*0.82,ay=ti*0.58;

// ---- STATE ----
let active = null, gl = null, animId = null, startTime = 0, currentSpeed = 1.0, hideTimer = null;

// ---- GALLERY ----
function buildList(container, items) {
  items.forEach(s => {
    const el = document.createElement('div');
    el.className = 'shader-link';
    el.innerHTML = `<div><h3>${s.name}</h3><p>${s.desc}</p></div><span class="arrow">→</span>`;
    el.addEventListener('click', () => openShader(s));
    container.appendChild(el);
  });
}
const userList = document.getElementById('user-shader-list');
const builtinList = document.getElementById('shader-list');
if (userShaders.length) {
  const lbl = document.createElement('div');
  lbl.className = 'section-label user-label';
  lbl.textContent = 'your shaders';
  userList.prepend(lbl);
  buildList(userList, userShaders);
}
if (builtinShaders.length) {
  const lbl = document.createElement('div');
  lbl.className = 'section-label';
  lbl.textContent = 'gallery';
  builtinList.prepend(lbl);
  buildList(builtinList, builtinShaders);
}

// ---- OPEN ----
function openShader(shader, fromPopstate) {
  active = shader;
  document.getElementById('gallery-screen').classList.add('hidden');
  document.getElementById('shader-screen').classList.add('active');
  document.getElementById('shader-title').textContent = shader.name;
  if (!fromPopstate) history.pushState({ shader: shader.id }, '', '#' + shader.id);

  const canvas = document.getElementById('c');
  gl = canvas.getContext('webgl2');
  if (!gl) { alert('WebGL2 required'); return; }

  function resize() {
    const dpr = Math.min(devicePixelRatio || 1, 1.5);
    canvas.width = Math.floor(innerWidth * dpr);
    canvas.height = Math.floor(innerHeight * dpr);
    if (gl) gl.viewport(0, 0, canvas.width, canvas.height);
  }
  window._rh = resize;
  addEventListener('resize', resize);
  resize();

  const vs = `#version 300 es\nin vec2 a_pos;\nvoid main(){gl_Position=vec4(a_pos,0,1);}`;
  function compile(type, src) {
    const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) { console.error(gl.getShaderInfoLog(s)); return null; }
    return s;
  }
  const p = gl.createProgram();
  gl.attachShader(p, compile(gl.VERTEX_SHADER, vs));
  gl.attachShader(p, compile(gl.FRAGMENT_SHADER, S[shader.id]));
  gl.linkProgram(p); gl.useProgram(p);

  const buf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
  const loc = gl.getAttribLocation(p, 'a_pos');
  gl.enableVertexAttribArray(loc); gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

  const uR = gl.getUniformLocation(p, 'u_res'), uT = gl.getUniformLocation(p, 'u_time');
  startTime = performance.now();

  function frame() {
    gl.uniform2f(uR, canvas.width, canvas.height);
    gl.uniform1f(uT, (performance.now() - startTime) * 0.001 * currentSpeed);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    animId = requestAnimationFrame(frame);
  }
  frame();
  resetHideTimer();
}

// ---- CLOSE ----
function closeShader() {
  if (animId) cancelAnimationFrame(animId);
  animId = null;
  if (window._rh) removeEventListener('resize', window._rh);
  document.getElementById('shader-screen').classList.remove('active');
  document.getElementById('gallery-screen').classList.remove('hidden');
  gl = null;
  active = null;
  document.body.classList.remove('hide-cursor');
}
document.getElementById('back-btn').addEventListener('click', () => { history.back(); });
window.addEventListener('popstate', (e) => {
  if (e.state && e.state.shader) {
    if (active) closeShader();
    const shader = shaders.find(s => s.id === e.state.shader);
    if (shader) openShader(shader, true);
  } else {
    if (active) closeShader();
  }
});

// ---- SPEED ----
const sRange = document.getElementById('s-range'), sVal = document.getElementById('speed-val');
function getSpeed() { return Math.pow(2, parseFloat(sRange.value)); }
function updateSpeed() { currentSpeed = getSpeed(); const s = currentSpeed; sVal.textContent = s >= 1 ? s.toFixed(1)+'×' : s.toFixed(2)+'×'; }
sRange.addEventListener('input', updateSpeed);
document.getElementById('s-down').addEventListener('click', () => { sRange.value = Math.max(-3, parseFloat(sRange.value)-0.25); updateSpeed(); });
document.getElementById('s-up').addEventListener('click', () => { sRange.value = Math.min(3, parseFloat(sRange.value)+0.25); updateSpeed(); });
document.addEventListener('keydown', e => {
  if (!active) return;
  if (e.key==='ArrowLeft') { sRange.value=Math.max(-3,parseFloat(sRange.value)-0.25); updateSpeed(); resetHideTimer(); }
  else if (e.key==='ArrowRight') { sRange.value=Math.min(3,parseFloat(sRange.value)+0.25); updateSpeed(); resetHideTimer(); }
  else if (e.key==='Escape') closeShader();
});
updateSpeed();

// ---- AUTO-HIDE ----
function resetHideTimer() {
  document.getElementById('controls').classList.remove('faded');
  document.getElementById('back-btn').style.opacity='1';
  document.getElementById('shader-title').style.opacity='1';
  document.body.classList.remove('hide-cursor');
  clearTimeout(hideTimer);
  hideTimer = setTimeout(() => {
    if (!active) return;
    document.getElementById('controls').classList.add('faded');
    document.getElementById('back-btn').style.opacity='0';
    document.getElementById('shader-title').style.opacity='0';
    document.body.classList.add('hide-cursor');
  }, 3000);
}
document.addEventListener('mousemove', () => { if (active) resetHideTimer(); });

// ---- RENDER CMD ----
function copyCmd(w, h) {
  if (!active) return;
  const dur=document.getElementById('r-dur').value, fps=document.getElementById('r-fps').value,
        fmt=document.getElementById('r-fmt').value, spd=currentSpeed.toFixed(4);
  const cmd=`node render.js ${dur} --shader=${active.id} --width=${w} --height=${h} --fps=${fps} --format=${fmt} --speed=${spd}`;
  navigator.clipboard.writeText(cmd).then(()=>showToast('Copied: '+cmd)).catch(()=>showToast(cmd));
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),4000);}
</script>
